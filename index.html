<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Blue Spring</title>
    <link rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>

<script>
    const player = new Audio();
    let currentEl = null;
    function playAudio(src, el) {
        if (currentEl && currentEl !== el) {
            currentEl.classList.remove('active');
        }
        if (!player.src.includes(src)) {
            player.src = src;
        }
        if (player.paused) {
            player.play();
            el.classList.add('active');
        } else {
            player.pause();
            el.classList.remove('active');
        }
        currentEl = el;
    }
</script>


<body class="body">

    <div class="container">

        <!-- Card 1 -->
        <div class="card" onclick="playAudio('txt1.mp3', this)">
            <img class="img" src="flowers.png" alt="oops">
            <h2 class="text">i know that we'll never change</h2>
        </div>

        <!-- Card 2 -->
        <div class="card" onclick="playAudio('nirvana.mp3', this)">
            <img class="img" src="gooses.png" alt="oops">
            <h2 class="text">and just maybe i'm too blame<br>for all i've hurt</h2>
        </div>

        <!-- Card 3 -->

            <img class="img" src="beach.png" alt="">

        </div>

        <!-- Card 4 -->

        </div>

        <!-- Card 5 -->

        </div>

        <!-- Card 6 -->

        </div>

    </div>

</body>

</html>
